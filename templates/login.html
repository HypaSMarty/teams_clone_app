{% extends "base.html" %}
{% block content %}
<div class="login-wrapper">
    <!-- Blurred Background -->
    <div class="background-blur"></div>

    <div class="row justify-content-center align-items-center min-vh-100">
        <div class="col-md-4">
            <div class="card shadow-lg">
                <!-- Logo Section -->
                <div class="text-center mt-3">
                    <img src="{{ url_for('static', filename='logo.png') }}" alt="Company Logo" class="login-logo mb-3">
                </div>

                <div class="card-header text-center fw-bold">Login</div>
                <div class="card-body">
                    <form method="POST" action="{{ url_for('auth.login') }}">
                        <div class="mb-3">
                            <label>Email</label>
                            <input type="email" name="email" class="form-control" placeholder="Enter your email" required>
                        </div>
                        <div class="mb-3">
                            <label>Password</label>
                            <input type="password" name="password" id="password" class="form-control" placeholder="Enter your password" required>
                        </div>
                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="showPassword" onclick="togglePassword()">
                            <label class="form-check-label" for="showPassword">Show Password</label>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Login</button>
                        <a href="{{ url_for('auth.register') }}" class="btn btn-link w-100 mt-2">Register</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
/* Fullscreen blurred background */
.login-wrapper {
    position: relative;
    width: 100%;
    min-height: 100vh;
}

.background-blur {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: url('{{ url_for("static", filename="wallpaper.jpg") }}');
    background-size: cover;
    background-position: center;
    filter: blur(8px);
    z-index: -1;
    opacity: 0.6;
}

/* Logo styling */
.login-logo {
    max-width: 150px;
}

/* Card adjustments */
.card {
    border-radius: 1rem;
    backdrop-filter: blur(10px);
    background-color: rgba(255, 255, 255, 0.85);
}

/* Responsive adjustments */
@media (max-width: 768px) {
    .login-logo {
        max-width: 120px;
    }

    .card {
        margin: 0 15px;
    }
}
</style>

<script>
function togglePassword() {
    const passwordField = document.getElementById('password');
    passwordField.type = passwordField.type === 'password' ? 'text' : 'password';
}
</script>
{% endblock %}
